<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>法大图书馆通知公告观察站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">CUPL Library Notice Watch</p>
          <h1>图书馆公开通知，每天自动归档。</h1>
          <p class="subtitle">跟踪中国政法大学图书馆公开通知、公告与服务信息，保留历史记录，支持关键词检索、栏目筛选、JSON/CSV 导出和每日自动更新。</p>
          <div class="actions">
            <a class="button primary" href="data/notices.json">下载 JSON</a>
            <a class="button ghost" href="data/notices.csv">下载 CSV</a>
          </div>
        </div>
        <div class="hero-card">
          <span>当前收录</span>
          <strong id="totalCount">0</strong>
          <span id="updatedAt">等待数据加载</span>
        </div>
      </section>
      <section class="toolbar">
        <input id="search" type="search" placeholder="搜索标题、栏目或日期..." />
        <select id="sectionFilter"><option value="">全部栏目</option></select>
      </section>
      <section class="stats" id="stats"></section>
      <section class="notice-list" id="noticeList"></section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
